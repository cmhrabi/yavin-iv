services:
  postgres:
    image: postgres:16-alpine
    container_name: yavin-iv-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: yavin
      POSTGRES_PASSWORD: yavin
      POSTGRES_DB: yavin_iv
    ports:
      - "5432:5432"
    volumes:
      - yavin-iv-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yavin -d yavin_iv"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  yavin-iv-pg:
